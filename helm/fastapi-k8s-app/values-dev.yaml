# Development environment values
replicaCount: 2

image:
  tag: "latest"

environment: development
debug: "true"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

ingress:
  hosts:
    - host: api-dev.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: fastapi-tls-dev
      hosts:
        - api-dev.example.com

podDisruptionBudget:
  minAvailable: 1
